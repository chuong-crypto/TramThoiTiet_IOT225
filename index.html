<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced IoT Weather Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            min-height: screen;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }
        .heartbeat {
            animation: beat 1.5s infinite;
        }
        @keyframes beat {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.4; }
            100% { transform: scale(1); opacity: 1; }
        }
        .gradient-text {
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <div>
                <h1 class="text-4xl font-black gradient-text">WEATHER STATION PRO</h1>
                <div class="flex items-center mt-2">
                    <div id="status-dot" class="w-3 h-3 bg-green-500 rounded-full heartbeat mr-2"></div>
                    <span id="status-text" class="text-slate-400 text-sm font-medium uppercase tracking-widest">Thiết bị đang trực tuyến</span>
                </div>
            </div>
            <div class="text-right glass px-6 py-3">
                <p id="current-time" class="text-xl font-mono font-bold text-sky-400">00:00:00</p>
                <p id="current-date" class="text-xs text-slate-400 uppercase">Ngày 01 tháng 01, 2024</p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-10">
            <div class="glass p-8 relative overflow-hidden group">
                <div class="absolute top-0 right-0 w-32 h-32 bg-orange-500/10 rounded-full -mr-16 -mt-16 blur-2xl group-hover:bg-orange-500/20 transition-all"></div>
                <div class="flex justify-between items-start mb-4">
                    <div class="p-4 bg-orange-500/20 rounded-2xl text-orange-400">
                        <i class="fa-solid fa-temperature-three-quarters fa-2x fa-bounce"></i>
                    </div>
                    <span class="text-xs font-bold text-orange-500/50 uppercase">Nhiệt độ</span>
                </div>
                <h2 id="temp-val" class="text-5xl font-bold mb-2">--°C</h2>
                <p class="text-slate-400 text-sm italic">Cảm biến DHT11</p>
            </div>

            <div class="glass p-8 relative overflow-hidden group">
                <div class="absolute top-0 right-0 w-32 h-32 bg-blue-500/10 rounded-full -mr-16 -mt-16 blur-2xl group-hover:bg-blue-500/20 transition-all"></div>
                <div class="flex justify-between items-start mb-4">
                    <div class="p-4 bg-blue-500/20 rounded-2xl text-blue-400">
                        <i class="fa-solid fa-droplet fa-2x fa-beat"></i>
                    </div>
                    <span class="text-xs font-bold text-blue-500/50 uppercase">Độ ẩm</span>
                </div>
                <h2 id="humi-val" class="text-5xl font-bold mb-2">--%</h2>
                <p class="text-slate-400 text-sm italic">Không khí ổn định</p>
            </div>

            <div class="glass p-8 relative overflow-hidden group">
                <div class="absolute top-0 right-0 w-32 h-32 bg-emerald-500/10 rounded-full -mr-16 -mt-16 blur-2xl group-hover:bg-emerald-500/20 transition-all"></div>
                <div class="flex justify-between items-start mb-4">
                    <div class="p-4 bg-emerald-500/20 rounded-2xl text-emerald-400">
                        <i class="fa-solid fa-gauge-high fa-2x fa-spin" style="--fa-animation-duration: 5s;"></i>
                    </div>
                    <span class="text-xs font-bold text-emerald-500/50 uppercase">Áp suất</span>
                </div>
                <h2 id="pres-val" class="text-5xl font-bold mb-2">-- hPa</h2>
                <p class="text-slate-400 text-sm italic">BMP180 Precision</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-10">
            <div class="glass p-6">
                <h3 class="text-lg font-bold mb-6 flex items-center">
                    <i class="fa-solid fa-chart-line mr-2 text-sky-400"></i> Biểu đồ Nhiệt độ & Độ ẩm
                </h3>
                <canvas id="multiChart" height="250"></canvas>
            </div>
            <div class="glass p-6">
                <h3 class="text-lg font-bold mb-6 flex items-center">
                    <i class="fa-solid fa-chart-area mr-2 text-emerald-400"></i> Biểu đồ Áp suất khí quyển
                </h3>
                <canvas id="pressureChart" height="250"></canvas>
            </div>
        </div>

        <div class="glass overflow-hidden">
            <div class="p-6 border-b border-white/10 flex justify-between items-center">
                <h3 class="text-lg font-bold">Lịch sử dữ liệu gần đây</h3>
                <button onclick="clearTable()" class="text-xs bg-red-500/20 text-red-400 px-3 py-1 rounded-full hover:bg-red-500/40">Xóa bảng</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-white/5 text-slate-400 text-xs uppercase font-bold">
                        <tr>
                            <th class="p-4">Thời gian</th>
                            <th class="p-4">Nhiệt độ</th>
                            <th class="p-4">Độ ẩm</th>
                            <th class="p-4">Áp suất</th>
                        </tr>
                    </thead>
                    <tbody id="history-body" class="text-sm divide-y divide-white/5">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // --- CẤU HÌNH FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyCRfbr0qfk3Dl3s4CL91ebv4Mwn_fh05wk",
            authDomain: "thoitiet-83ada.firebaseapp.com",
            databaseURL: "https://thoitiet-83ada-default-rtdb.firebaseio.com",
            projectId: "thoitiet-83ada",
            storageBucket: "thoitiet-83ada.firebasestorage.app",
            messagingSenderId: "960783631266",
            appId: "1:960783631266:web:ecd353248ea26191fca8fb"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // --- KHỞI TẠO BIỂU ĐỒ ---
        const chartOptions = {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { labels: { color: '#94a3b8' } } },
            scales: {
                y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#64748b' } },
                x: { grid: { display: false }, ticks: { color: '#64748b' } }
            }
        };

        const multiChart = new Chart(document.getElementById('multiChart'), {
            type: 'line',
            data: { labels: [], datasets: [
                { label: 'Nhiệt độ (°C)', data: [], borderColor: '#f97316', tension: 0.4 },
                { label: 'Độ ẩm (%)', data: [], borderColor: '#3b82f6', tension: 0.4 }
            ]},
            options: chartOptions
        });

        const pressureChart = new Chart(document.getElementById('pressureChart'), {
            type: 'line',
            data: { labels: [], datasets: [
                { label: 'Áp suất (hPa)', data: [], borderColor: '#10b981', backgroundColor: 'rgba(16,185,129,0.1)', fill: true, tension: 0.4 }
            ]},
            options: chartOptions
        });

        // --- XỬ LÝ DỮ LIỆU ---
        database.ref('/weather').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                const now = new Date().toLocaleTimeString();
                
                // Cập nhật thẻ
                document.getElementById('temp-val').innerText = data.temperature.toFixed(1) + "°C";
                document.getElementById('humi-val').innerText = data.humidity.toFixed(1) + "%";
                document.getElementById('pres-val').innerText = Math.round(data.pressure) + " hPa";

                // Cập nhật nhịp đập kết nối
                document.getElementById('status-dot').classList.remove('bg-red-500');
                document.getElementById('status-dot').classList.add('bg-green-500');
                document.getElementById('status-text').innerText = "Thiết bị đang trực tuyến";

                // Cập nhật biểu đồ (giữ 10 giá trị)
                [multiChart, pressureChart].forEach(chart => {
                    if (chart.data.labels.length > 10) {
                        chart.data.labels.shift();
                        chart.data.datasets.forEach(ds => ds.data.shift());
                    }
                    chart.data.labels.push(now);
                });
                multiChart.data.datasets[0].data.push(data.temperature);
                multiChart.data.datasets[1].data.push(data.humidity);
                pressureChart.data.datasets[0].data.push(data.pressure);
                multiChart.update();
                pressureChart.update();

                // Thêm vào bảng lịch sử
                const tableBody = document.getElementById('history-body');
                const row = `<tr>
                    <td class="p-4 font-mono text-sky-400">${now}</td>
                    <td class="p-4">${data.temperature.toFixed(1)}°C</td>
                    <td class="p-4">${data.humidity.toFixed(1)}%</td>
                    <td class="p-4">${Math.round(data.pressure)} hPa</td>
                </tr>`;
                tableBody.insertAdjacentHTML('afterbegin', row);
                if (tableBody.rows.length > 8) tableBody.deleteRow(8);
            }
        });

        // Cập nhật đồng hồ hệ thống
        setInterval(() => {
            const d = new Date();
            document.getElementById('current-time').innerText = d.toLocaleTimeString();
            document.getElementById('current-date').innerText = d.toLocaleDateString('vi-VN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        }, 1000);

        function clearTable() { document.getElementById('history-body').innerHTML = ''; }
    </script>
</body>
</html>
