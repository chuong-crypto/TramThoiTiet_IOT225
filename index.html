<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRẠM THỜI TIẾT IOT225</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        :root { --bg: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); --card: rgba(30, 41, 59, 0.6); --text: #f1f5f9; }
        .light { --bg: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); --card: rgba(255, 255, 255, 0.8); --text: #1e293b; }
        body { background: var(--bg); color: var(--text); transition: all 0.4s ease; min-height: 100vh; font-family: 'Inter', sans-serif; }
        .glass { background: var(--card); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; }
        .is-offline { filter: grayscale(1) blur(2px); opacity: 0.5; pointer-events: none; }
        .title-green { background: linear-gradient(90deg, #10b981, #34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .heartbeat { animation: beat 1.5s infinite; }
        @keyframes beat { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.4); opacity: 0.5; } }
        /* Switch UI */
        .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #475569; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #10b981; }
        input:checked + .slider:before { transform: translateX(22px); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-6">
            <div>
                <h1 class="text-4xl font-black title-green uppercase tracking-tighter">TRẠM THỜI TIẾT IOT225</h1>
                <div class="flex items-center mt-2 justify-center md:justify-start">
                    <div id="status-dot" class="w-3 h-3 bg-red-500 rounded-full heartbeat mr-2"></div>
                    <span id="status-text" class="text-slate-500 text-[10px] font-bold uppercase tracking-widest">Đang kết nối...</span>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <div class="glass px-4 py-2 flex items-center gap-3">
                    <i class="fa-solid fa-sun text-orange-400"></i>
                    <label class="switch"><input type="checkbox" id="mode-toggle"><span class="slider"></span></label>
                    <i class="fa-solid fa-moon text-slate-400"></i>
                </div>
                <div class="glass px-6 py-2 text-right min-w-[160px]">
                    <p id="clock" class="text-xl font-mono font-bold text-emerald-500">00:00:00</p>
                    <p id="date" class="text-[9px] opacity-60 uppercase">Đang tải...</p>
                </div>
            </div>
        </div>

        <div id="main-content" class="transition-all duration-500">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="glass p-6 border-b-4 border-emerald-500">
                    <p class="text-[10px] font-bold opacity-50 uppercase mb-2 text-emerald-500">Nhiệt độ (DHT11)</p>
                    <h2 id="temp-val" class="text-5xl font-black italic">--°C</h2>
                </div>
                <div class="glass p-6 border-b-4 border-blue-500">
                    <p class="text-[10px] font-bold opacity-50 uppercase mb-2 text-blue-500">Độ ẩm (DHT11)</p>
                    <h2 id="humi-val" class="text-5xl font-black italic">--%</h2>
                </div>
                <div class="glass p-6 border-b-4 border-sky-500">
                    <p class="text-[10px] font-bold opacity-50 uppercase mb-2 text-sky-500">Áp suất (BMP180)</p>
                    <h2 id="pres-val" class="text-4xl font-black italic pt-2">-- hPa</h2>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-2 space-y-8">
                    <div class="glass p-6 h-[400px]">
                        <h3 class="text-xs font-bold mb-4 opacity-50 uppercase tracking-widest text-emerald-500">Lịch sử Nhiệt độ & Độ ẩm (Real-time)</h3>
                        <canvas id="weatherChart"></canvas>
                    </div>
                </div>

                <div class="glass flex flex-col h-[400px] overflow-hidden border-t-4 border-emerald-500/40">
                    <div class="p-4 bg-emerald-500/10 flex justify-between items-center border-b border-white/5">
                        <h3 class="text-[11px] font-black uppercase tracking-widest"><i class="fa-solid fa-list-ul mr-2"></i>Nhật ký dữ liệu</h3>
                        <span class="text-[8px] bg-emerald-500 text-white px-2 py-0.5 rounded-full">15 bản ghi</span>
                    </div>
                    <div class="overflow-y-auto flex-grow p-2">
                        <table class="w-full text-left">
                            <thead class="text-[9px] opacity-40 uppercase sticky top-0 bg-slate-900 z-10">
                                <tr>
                                    <th class="p-2">Giờ</th>
                                    <th class="p-2">T°C</th>
                                    <th class="p-2">H%</th>
                                    <th class="p-2">P(hPa)</th>
                                </tr>
                            </thead>
                            <tbody id="history-body" class="text-[11px] font-mono divide-y divide-white/5">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyCRfbr0qfk3Dl3s4CL91ebv4Mwn_fh05wk",
            authDomain: "thoitiet-83ada.firebaseapp.com",
            databaseURL: "https://thoitiet-83ada-default-rtdb.firebaseio.com",
            projectId: "thoitiet-83ada",
            storageBucket: "thoitiet-83ada.firebasestorage.app",
            messagingSenderId: "960783631266",
            appId: "1:960783631266:web:ecd353248ea26191fca8fb"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let lastSeen = 0;
        const OFFLINE_LIMIT = 25000; // 25 giây 

        // --- CHART SETUP ---
        const weatherChart = new Chart(document.getElementById('weatherChart'), {
            type: 'line',
            data: { labels: [], datasets: [
                { label: 'Nhiệt độ', data: [], borderColor: '#10b981', tension: 0.5, pointRadius: 0 },
                { label: 'Độ ẩm', data: [], borderColor: '#3b82f6', tension: 0.5, pointRadius: 0 }
            ]},
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { labels: { color: '#94a3b8', font: { size: 10 } } } },
                scales: {
                    x: { grid: { display: false }, ticks: { color: '#64748b', font: { size: 9 } } },
                    y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#64748b' } }
                }
            }
        });

        // --- DATA PROCESSING ---
        database.ref('/weather').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                lastSeen = Date.now();
                updateDashboard(data);
                toggleConnection(true);
            }
        });

        function updateDashboard(data) {
            const t = Number(data.temperature);
            const h = Number(data.humidity);
            const p = Number(data.pressure);
            const time = new Date().toLocaleTimeString('vi-VN', { hour12: false });

            // Cập nhật số liệu [cite: 121]
            document.getElementById('temp-val').innerText = t.toFixed(1) + "°C";
            document.getElementById('humi-val').innerText = h.toFixed(0) + "%";
            document.getElementById('pres-val').innerText = Math.round(p) + " hPa";

            // Cập nhật biểu đồ 
            if (weatherChart.data.labels.length > 15) {
                weatherChart.data.labels.shift();
                weatherChart.data.datasets[0].data.shift();
                weatherChart.data.datasets[1].data.shift();
            }
            weatherChart.data.labels.push(time);
            weatherChart.data.datasets[0].data.push(t);
            weatherChart.data.datasets[1].data.push(h);
            weatherChart.update('none');

            // Cập nhật BẢNG LỊCH SỬ
            const tableBody = document.getElementById('history-body');
            const row = `<tr class="hover:bg-emerald-500/10 transition-colors">
                <td class="p-2 text-emerald-500 font-bold">${time}</td>
                <td class="p-2">${t.toFixed(1)}</td>
                <td class="p-2">${h.toFixed(0)}</td>
                <td class="p-2">${Math.round(p)}</td>
            </tr>`;
            tableBody.insertAdjacentHTML('afterbegin', row);
            if (tableBody.rows.length > 15) tableBody.deleteRow(15);
        }

        // --- WATCHDOG & UI LOGIC ---
        setInterval(() => {
            if (Date.now() - lastSeen > OFFLINE_LIMIT) toggleConnection(false);
        }, 5000);

        function toggleConnection(isOnline) {
            const dot = document.getElementById('status-dot');
            const txt = document.getElementById('status-text');
            const main = document.getElementById('main-content');
            if (isOnline) {
                dot.className = "w-3 h-3 bg-green-500 rounded-full heartbeat mr-2";
                txt.innerText = "THIẾT BỊ TRỰC TUYẾN";
                txt.className = "text-green-500 text-[10px] font-bold uppercase";
                main.classList.remove('is-offline');
            } else {
                dot.className = "w-3 h-3 bg-red-600 rounded-full mr-2";
                txt.innerText = "THIẾT BỊ NGOẠI TUYẾN (OFFLINE)";
                txt.className = "text-red-500 text-[10px] font-bold uppercase";
                main.classList.add('is-offline');
            }
        }

        document.getElementById('mode-toggle').addEventListener('change', function() {
            document.documentElement.classList.toggle('light');
        });

        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('vi-VN');
            document.getElementById('date').innerText = now.toLocaleDateString('vi-VN', { weekday: 'long', day: 'numeric', month: 'long' });
        }, 1000);
    </script>
</body>
</html>
