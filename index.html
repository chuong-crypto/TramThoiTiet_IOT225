<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRẠM THỜI TIẾT IOT225</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        /* Biến màu sắc cho 2 chế độ */
        :root { --bg: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); --card: rgba(30, 41, 59, 0.6); --text: #f1f5f9; --border: rgba(255,255,255,0.1); }
        .light { --bg: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); --card: rgba(255, 255, 255, 0.8); --text: #1e293b; --border: rgba(0,0,0,0.1); }

        body { background: var(--bg); color: var(--text); transition: all 0.4s ease; min-height: 100vh; }
        .glass { background: var(--card); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 24px; transition: all 0.3s ease; }
        
        /* Hiệu ứng khi Offline */
        .is-offline { filter: grayscale(1) blur(1px); opacity: 0.5; pointer-events: none; }
        
        .heartbeat { animation: beat 1.5s infinite; }
        @keyframes beat { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.4); opacity: 0.5; } }
        
        .title-green { background: linear-gradient(90deg, #10b981, #34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Nút gạt Switch */
        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #475569; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #10b981; }
        input:checked + .slider:before { transform: translateX(24px); }
    </style>
</head>
<body class="p-4 md:p-10 font-sans">

    <div class="max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div>
                <h1 class="text-4xl font-black title-green uppercase tracking-tighter">TRẠM THỜI TIẾT IOT225</h1>
                <div class="flex items-center justify-center md:justify-start mt-2">
                    <div id="status-dot" class="w-3 h-3 bg-red-500 rounded-full heartbeat mr-2"></div>
                    <span id="status-text" class="text-slate-500 text-[10px] font-bold uppercase tracking-widest">Đang kết nối...</span>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <div class="glass px-4 py-2 flex items-center gap-3">
                    <i class="fa-solid fa-sun text-orange-400 text-sm"></i>
                    <label class="switch">
                        <input type="checkbox" id="mode-toggle">
                        <span class="slider"></span>
                    </label>
                    <i class="fa-solid fa-moon text-slate-400 text-sm"></i>
                </div>
                <div class="glass px-6 py-2 text-right">
                    <p id="clock" class="text-xl font-mono font-bold text-emerald-500">00:00:00</p>
                    <p id="date" class="text-[10px] opacity-60 uppercase">Đang tải...</p>
                </div>
            </div>
        </div>

        <div id="main-content" class="transition-all duration-500">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                <div class="glass p-8 relative overflow-hidden group border-b-4 border-emerald-500">
                    <div class="flex justify-between items-center mb-4">
                        <div class="p-3 bg-emerald-500/20 rounded-xl text-emerald-400"><i class="fa-solid fa-temperature-high fa-2x"></i></div>
                        <span class="text-[10px] font-bold opacity-50 uppercase">Nhiệt độ</span>
                    </div>
                    <h2 id="temp-val" class="text-6xl font-black">--°C</h2>
                </div>

                <div class="glass p-8 relative overflow-hidden group border-b-4 border-blue-500">
                    <div class="flex justify-between items-center mb-4">
                        <div class="p-3 bg-blue-500/20 rounded-xl text-blue-400"><i class="fa-solid fa-droplet fa-2x"></i></div>
                        <span class="text-[10px] font-bold opacity-50 uppercase">Độ ẩm</span>
                    </div>
                    <h2 id="humi-val" class="text-6xl font-black">--%</h2>
                </div>

                <div class="glass p-8 relative overflow-hidden group border-b-4 border-sky-500">
                    <div class="flex justify-between items-center mb-4">
                        <div class="p-3 bg-sky-500/20 rounded-xl text-sky-400"><i class="fa-solid fa-gauge fa-2x"></i></div>
                        <span class="text-[10px] font-bold opacity-50 uppercase">Áp suất</span>
                    </div>
                    <h2 id="pres-val" class="text-5xl font-black pt-1">-- hPa</h2>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-10">
                <div class="glass p-6 h-[400px]">
                    <h3 class="text-xs font-bold mb-4 opacity-50 uppercase">Biểu đồ Nhiệt độ & Độ ẩm</h3>
                    <canvas id="weatherChart"></canvas>
                </div>
                <div class="glass p-6 h-[400px]">
                    <h3 class="text-xs font-bold mb-4 opacity-50 uppercase">Biến thiên Áp suất</h3>
                    <canvas id="pressureChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCRfbr0qfk3Dl3s4CL91ebv4Mwn_fh05wk",
            authDomain: "thoitiet-83ada.firebaseapp.com",
            databaseURL: "https://thoitiet-83ada-default-rtdb.firebaseio.com",
            projectId: "thoitiet-83ada",
            storageBucket: "thoitiet-83ada.firebasestorage.app",
            messagingSenderId: "960783631266",
            appId: "1:960783631266:web:ecd353248ea26191fca8fb"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let lastSeen = 0;
        const OFFLINE_LIMIT = 25000; // 25 giây

        // Setup Biểu đồ mượt mà (Curves)
        const commonOptions = {
            responsive: true,
            maintainAspectRatio: false,
            elements: { line: { tension: 0.5 } }, // Đường cong mềm mại
            plugins: { legend: { display: true, labels: { color: '#94a3b8' } } },
            scales: {
                x: { grid: { display: false }, ticks: { color: '#64748b' } },
                y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#64748b' } }
            }
        };

        const weatherChart = new Chart(document.getElementById('weatherChart'), {
            type: 'line',
            data: { labels: [], datasets: [
                { label: 'Temp', data: [], borderColor: '#10b981', pointRadius: 0 },
                { label: 'Humi', data: [], borderColor: '#3b82f6', pointRadius: 0 }
            ]},
            options: commonOptions
        });

        const pressureChart = new Chart(document.getElementById('pressureChart'), {
            type: 'line',
            data: { labels: [], datasets: [
                { label: 'hPa', data: [], borderColor: '#0ea5e9', fill: true, backgroundColor: 'rgba(14,165,233,0.1)', pointRadius: 0 }
            ]},
            options: commonOptions
        });

        // Lắng nghe Firebase
        database.ref('/weather').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                lastSeen = Date.now();
                updateDisplay(data);
                toggleOfflineUI(false);
            }
        });

        function updateDisplay(data) {
            const t = Number(data.temperature);
            const h = Number(data.humidity);
            const p = Number(data.pressure);
            const time = new Date().toLocaleTimeString('vi-VN', { hour12: false });

            document.getElementById('temp-val').innerText = t.toFixed(1) + "°C";
            document.getElementById('humi-val').innerText = h.toFixed(1) + "%";
            document.getElementById('pres-val').innerText = Math.round(p) + " hPa";

            // Cập nhật biểu đồ
            [weatherChart, pressureChart].forEach(c => {
                if (c.data.labels.length > 15) { c.data.labels.shift(); c.data.datasets.forEach(d => d.data.shift()); }
                c.data.labels.push(time);
            });
            weatherChart.data.datasets[0].data.push(t);
            weatherChart.data.datasets[1].data.push(h);
            pressureChart.data.datasets[0].data.push(p);
            weatherChart.update('none');
            pressureChart.update('none');
        }

        // Logic Offline Watchdog
        setInterval(() => {
            if (Date.now() - lastSeen > OFFLINE_LIMIT) toggleOfflineUI(true);
        }, 5000);

        function toggleOfflineUI(isOffline) {
            const dot = document.getElementById('status-dot');
            const txt = document.getElementById('status-text');
            const main = document.getElementById('main-content');

            if (isOffline) {
                dot.className = "w-3 h-3 bg-red-600 rounded-full mr-2";
                txt.innerText = "THIẾT BỊ NGOẠI TUYẾN (OFFLINE)";
                txt.className = "text-red-500 text-[10px] font-bold uppercase tracking-widest";
                main.classList.add('is-offline');
            } else {
                dot.className = "w-3 h-3 bg-green-500 rounded-full heartbeat mr-2";
                txt.innerText = "THIẾT BỊ ĐANG TRỰC TUYẾN";
                txt.className = "text-green-500 text-[10px] font-bold uppercase tracking-widest";
                main.classList.remove('is-offline');
            }
        }

        // Nút gạt chuyển màu
        document.getElementById('mode-toggle').addEventListener('change', function() {
            document.documentElement.classList.toggle('light');
            // Cập nhật màu chữ biểu đồ cho hợp với nền sáng/tối
            const isLight = document.documentElement.classList.contains('light');
            const color = isLight ? '#64748b' : '#94a3b8';
            [weatherChart, pressureChart].forEach(c => {
                c.options.plugins.legend.labels.color = color;
                c.options.scales.x.ticks.color = color;
                c.options.scales.y.ticks.color = color;
                c.update();
            });
        });

        // Đồng hồ thời gian thực
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('vi-VN');
            document.getElementById('date').innerText = now.toLocaleDateString('vi-VN', { weekday: 'long', day: 'numeric', month: 'long' });
        }, 1000);
    </script>
</body>
</html>
