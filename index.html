<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRẠM THỜI TIẾT IOT225</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --bg-color: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); --text-color: #f1f5f9; }
        body { background: var(--bg-color); color: var(--text-color); transition: all 0.5s ease; }
        .glass { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; }
        .offline { filter: grayscale(1) opacity(0.6); pointer-events: none; }
        .heartbeat { animation: beat 1.5s infinite; }
        @keyframes beat { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.4); opacity: 0.5; } }
        /* Đổi màu tiêu đề sang xanh lá rực rỡ */
        .title-green { background: linear-gradient(90deg, #10b981, #34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="p-4 md:p-10 min-h-screen">

    <div class="max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6 text-center md:text-left">
            <div>
                <h1 class="text-4xl font-black title-green uppercase tracking-tighter">TRẠM THỜI TIẾT IOT225</h1>
                <div class="flex items-center justify-center md:justify-start mt-2">
                    <div id="status-dot" class="w-3 h-3 bg-red-500 rounded-full heartbeat mr-2"></div>
                    <span id="status-text" class="text-slate-500 text-xs font-bold uppercase tracking-widest">Đang kiểm tra kết nối...</span>
                </div>
            </div>
            
            <div class="glass px-6 py-3 min-w-[150px]">
                <p id="current-time" class="text-xl font-mono font-bold text-emerald-400">--:--:--</p>
                <p id="current-date" class="text-[10px] text-slate-400 uppercase">Đang tải...</p>
            </div>
        </div>

        <div id="main-dashboard" class="transition-all duration-700">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-10">
                <div class="glass p-8 border-l-8 border-emerald-500">
                    <span class="text-xs font-bold text-emerald-500/70 uppercase">Nhiệt độ</span>
                    <h2 id="temp-val" class="text-6xl font-black mt-2">--°C</h2>
                </div>
                <div class="glass p-8 border-l-8 border-blue-500">
                    <span class="text-xs font-bold text-blue-500/70 uppercase">Độ ẩm</span>
                    <h2 id="humi-val" class="text-6xl font-black mt-2">--%</h2>
                </div>
                <div class="glass p-8 border-l-8 border-sky-500">
                    <span class="text-xs font-bold text-sky-500/70 uppercase">Áp suất</span>
                    <h2 id="pres-val" class="text-5xl font-black mt-2">-- hPa</h2>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-10">
                <div class="glass p-6 h-[350px]"><canvas id="multiChart"></canvas></div>
                <div class="glass p-6 h-[350px]"><canvas id="pressureChart"></canvas></div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCRfbr0qfk3Dl3s4CL91ebv4Mwn_fh05wk",
            authDomain: "thoitiet-83ada.firebaseapp.com",
            databaseURL: "https://thoitiet-83ada-default-rtdb.firebaseio.com",
            projectId: "thoitiet-83ada",
            storageBucket: "thoitiet-83ada.firebasestorage.app",
            messagingSenderId: "960783631266",
            appId: "1:960783631266:web:ecd353248ea26191fca8fb"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let lastActiveTime = 0; // Lưu thời điểm cuối nhận dữ liệu
        const TIMEOUT_MS = 25000; // 25 giây không có số mới = Offline

        // Khởi tạo biểu đồ (giữ nguyên logic cũ nhưng thêm tension cho mượt)
        const ctx1 = document.getElementById('multiChart');
        const multiChart = new Chart(ctx1, {
            type: 'line',
            data: { labels: [], datasets: [
                { label: 'Temp', data: [], borderColor: '#10b981', tension: 0.4 },
                { label: 'Humi', data: [], borderColor: '#3b82f6', tension: 0.4 }
            ]},
            options: { responsive: true, maintainAspectRatio: false }
        });

        // Lắng nghe dữ liệu
        database.ref('/weather').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                lastActiveTime = Date.now(); // Cập nhật thời gian thực
                updateUI(data);
                setOnlineStatus(true);
            }
        });

        function updateUI(data) {
            document.getElementById('temp-val').innerText = Number(data.temperature).toFixed(1) + "°C";
            document.getElementById('humi-val').innerText = Number(data.humidity).toFixed(1) + "%";
            document.getElementById('pres-val').innerText = Math.round(data.pressure) + " hPa";
            
            // Update chart
            const now = new Date().toLocaleTimeString();
            if (multiChart.data.labels.length > 10) {
                multiChart.data.labels.shift();
                multiChart.data.datasets[0].data.shift();
            }
            multiChart.data.labels.push(now);
            multiChart.data.datasets[0].data.push(data.temperature);
            multiChart.update();
        }

        function setOnlineStatus(isOnline) {
            const dot = document.getElementById('status-dot');
            const text = document.getElementById('status-text');
            const board = document.getElementById('main-dashboard');

            if (isOnline) {
                dot.className = "w-3 h-3 bg-green-500 rounded-full heartbeat mr-2";
                text.innerText = "THIẾT BỊ ĐANG TRỰC TUYẾN";
                text.className = "text-green-500 text-xs font-bold uppercase tracking-widest";
                board.classList.remove('offline');
            } else {
                dot.className = "w-3 h-3 bg-red-500 rounded-full mr-2";
                text.innerText = "THIẾT BỊ NGOẠI TUYẾN (OFFLINE)";
                text.className = "text-red-500 text-xs font-bold uppercase tracking-widest";
                board.classList.add('offline');
            }
        }

        // VÒNG LẶP KIỂM TRA (WATCHDOG)
        setInterval(() => {
            if (Date.now() - lastActiveTime > TIMEOUT_MS) {
                setOnlineStatus(false);
            }
        }, 5000); // Cứ 5 giây kiểm tra 1 lần

        // Đồng hồ
        setInterval(() => {
            const n = new Date();
            document.getElementById('current-time').innerText = n.toLocaleTimeString('vi-VN');
            document.getElementById('current-date').innerText = n.toLocaleDateString('vi-VN', { weekday: 'long', day: 'numeric', month: 'long' });
        }, 1000);
    </script>
</body>
</html>
