<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sửa lỗi Biểu đồ - Weather Station PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: white; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; }
        .heartbeat { animation: beat 1.5s infinite; }
        @keyframes beat { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.4); opacity: 0.5; } }
        .gradient-text { background: linear-gradient(90deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4 text-center md:text-left">
            <div>
                <h1 class="text-4xl font-black gradient-text uppercase">Weather System Pro</h1>
                <div class="flex items-center justify-center md:justify-start mt-2">
                    <div id="status-dot" class="w-3 h-3 bg-red-500 rounded-full heartbeat mr-2"></div>
                    <span id="status-text" class="text-slate-400 text-xs font-bold uppercase tracking-widest">Đang chờ dữ liệu...</span>
                </div>
            </div>
            <div class="glass px-6 py-3">
                <p id="current-time" class="text-xl font-mono font-bold text-sky-400">--:--:--</p>
                <p id="current-date" class="text-[10px] text-slate-400 uppercase tracking-tighter">Đang tải thời gian...</p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="glass p-6 border-b-4 border-orange-500/50">
                <div class="flex justify-between items-center mb-4">
                    <i class="fa-solid fa-temperature-half text-orange-400 text-3xl"></i>
                    <span class="text-[10px] font-bold text-orange-500 opacity-50 uppercase">Nhiệt độ</span>
                </div>
                <h2 id="temp-val" class="text-5xl font-bold">--°C</h2>
            </div>
            <div class="glass p-6 border-b-4 border-blue-500/50">
                <div class="flex justify-between items-center mb-4">
                    <i class="fa-solid fa-droplet text-blue-400 text-3xl"></i>
                    <span class="text-[10px] font-bold text-blue-500 opacity-50 uppercase">Độ ẩm</span>
                </div>
                <h2 id="humi-val" class="text-5xl font-bold">--%</h2>
            </div>
            <div class="glass p-6 border-b-4 border-emerald-500/50">
                <div class="flex justify-between items-center mb-4">
                    <i class="fa-solid fa-gauge-high text-emerald-400 text-3xl"></i>
                    <span class="text-[10px] font-bold text-emerald-500 opacity-50 uppercase">Áp suất</span>
                </div>
                <h2 id="pres-val" class="text-4xl font-bold pt-2">-- hPa</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-10">
            <div class="glass p-6 h-[350px]">
                <h3 class="text-sm font-bold mb-4 uppercase text-slate-400">Lịch sử Nhiệt độ & Độ ẩm</h3>
                <canvas id="multiChart"></canvas>
            </div>
            <div class="glass p-6 h-[350px]">
                <h3 class="text-sm font-bold mb-4 uppercase text-slate-400">Áp suất khí quyển (hPa)</h3>
                <canvas id="pressureChart"></canvas>
            </div>
        </div>

        <div class="glass overflow-hidden">
            <div class="p-4 bg-white/5 border-b border-white/10 flex justify-between items-center">
                <h3 class="text-sm font-bold uppercase tracking-widest">Nhật ký dữ liệu</h3>
                <span class="text-[10px] text-slate-500">Hiển thị 10 bản ghi gần nhất</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="text-[10px] text-slate-500 uppercase bg-black/20">
                        <tr>
                            <th class="p-4">Thời gian</th>
                            <th class="p-4">Nhiệt độ</th>
                            <th class="p-4">Độ ẩm</th>
                            <th class="p-4">Áp suất</th>
                        </tr>
                    </thead>
                    <tbody id="history-body" class="text-sm font-mono divide-y divide-white/5">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyCRfbr0qfk3Dl3s4CL91ebv4Mwn_fh05wk",
            authDomain: "thoitiet-83ada.firebaseapp.com",
            databaseURL: "https://thoitiet-83ada-default-rtdb.firebaseio.com",
            projectId: "thoitiet-83ada",
            storageBucket: "thoitiet-83ada.firebasestorage.app",
            messagingSenderId: "960783631266",
            appId: "1:960783631266:web:ecd353248ea26191fca8fb"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // --- CHART INITIALIZATION ---
        const commonOptions = {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: true, labels: { color: '#94a3b8', font: { size: 10 } } } },
            scales: {
                x: { grid: { display: false }, ticks: { color: '#475569', font: { size: 10 } } },
                y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#475569', font: { size: 10 } } }
            }
        };

        const multiChart = new Chart(document.getElementById('multiChart'), {
            type: 'line',
            data: { labels: [], datasets: [
                { label: 'Temp (°C)', data: [], borderColor: '#f97316', tension: 0.4, pointRadius: 2 },
                { label: 'Humi (%)', data: [], borderColor: '#3b82f6', tension: 0.4, pointRadius: 2 }
            ]},
            options: commonOptions
        });

        const pressureChart = new Chart(document.getElementById('pressureChart'), {
            type: 'line',
            data: { labels: [], datasets: [
                { label: 'Pressure', data: [], borderColor: '#10b981', backgroundColor: 'rgba(16,185,129,0.1)', fill: true, tension: 0.4, pointRadius: 2 }
            ]},
            options: commonOptions
        });

        // --- DATA HANDLING ---
        database.ref('/weather').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                console.log("Dữ liệu nhận được:", data); // Kiểm tra lỗi ở Console F12
                
                // Ép kiểu số để tránh lỗi toFixed()
                const t = Number(data.temperature);
                const h = Number(data.humidity);
                const p = Number(data.pressure);
                const now = new Date().toLocaleTimeString('vi-VN', { hour12: false });

                // Cập nhật UI
                document.getElementById('temp-val').innerText = t.toFixed(1) + "°C";
                document.getElementById('humi-val').innerText = h.toFixed(1) + "%";
                document.getElementById('pres-val').innerText = Math.round(p) + " hPa";

                // Trạng thái trực tuyến
                document.getElementById('status-dot').className = "w-3 h-3 bg-green-500 rounded-full heartbeat mr-2";
                document.getElementById('status-text').innerText = "Thiết bị đang trực tuyến";

                // Cập nhật Biểu đồ
                [multiChart, pressureChart].forEach(c => {
                    if (c.data.labels.length > 10) {
                        c.data.labels.shift();
                        c.data.datasets.forEach(d => d.data.shift());
                    }
                    c.data.labels.push(now);
                });
                multiChart.data.datasets[0].data.push(t);
                multiChart.data.datasets[1].data.push(h);
                pressureChart.data.datasets[0].data.push(p);
                multiChart.update('none'); // Update nhanh không animation để tránh giật
                pressureChart.update('none');

                // Cập nhật Bảng
                const tbody = document.getElementById('history-body');
                const row = `<tr class="hover:bg-white/5 transition-colors">
                    <td class="p-4 text-sky-400">${now}</td>
                    <td class="p-4">${t.toFixed(1)}°C</td>
                    <td class="p-4">${h.toFixed(1)}%</td>
                    <td class="p-4">${Math.round(p)}</td>
                </tr>`;
                tbody.insertAdjacentHTML('afterbegin', row);
                if (tbody.rows.length > 10) tbody.deleteRow(10);
            }
        }, (error) => {
            console.error("Lỗi Firebase:", error);
            document.getElementById('status-text').innerText = "Lỗi kết nối Firebase!";
        });

        // Time Update
        setInterval(() => {
            const now = new Date();
            document.getElementById('current-time').innerText = now.toLocaleTimeString('vi-VN');
            document.getElementById('current-date').innerText = now.toLocaleDateString('vi-VN', { weekday: 'long', day: 'numeric', month: 'long' });
        }, 1000);
    </script>
</body>
</html>
